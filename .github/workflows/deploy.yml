# Deploy automático para rafael.grupovoll.com.br (Vercel).
# A cada push na branch main: build + deploy em produção.
#
# Secrets necessários no repositório (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN    - Token da Vercel (Account Settings → Tokens)
#   VERCEL_ORG_ID   - ID da equipe/org (Settings do projeto ou .vercel/project.json)
#   VERCEL_PROJECT_ID - ID do projeto Vercel

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
